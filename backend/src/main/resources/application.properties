spring.config.import=optional:file:.env[.properties]

spring.application.name=cms

# Database Connections mapped to .env values
spring.datasource.url=jdbc:postgresql://localhost:5432/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASS}

spring.threads.virtual.enabled=true

jwt.secret=${JWT_SECRET}
jwt.access_token.expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh_token.expiration=${JWT_REFRESH_EXPIRATION}

vault.encryption.key=${ENCRYPTION_KEY}

server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${KEYSTORE_PASSWORD}
server.ssl.key-alias=${KEYSTORE_ALIAS}

# ⚡ Force Spring Security to print every internal evaluation step to the terminal log
logging.level.org.springframework.security=${LOGGING_MODE}
logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=${AUTH_MODE}

# Include exceptions messages in server response logs (useful for checking terminal output)
server.error.include-message=${MESSAGE_MODE}